server.port=8080

# Firebase Configuration
# Em produção, use variável de ambiente: FIREBASE_CONFIG_PATH
firebase.config.path=${FIREBASE_CONFIG_PATH:classpath:serviceAccountKey.json}
firebase.storage.bucket=${FIREBASE_STORAGE_BUCKET:defesa-civil-386b0.firebasestorage.app}

# Admin password — OBRIGATÓRIO configurar via variável de ambiente em produção
# export APP_ADMIN_PASSWORD=SuaSenhaSeguraAqui
app.admin.password=${APP_ADMIN_PASSWORD:}

# Mail Configuration — usar variáveis de ambiente em produção
# export MAIL_USERNAME=seu_email@gmail.com
# export MAIL_PASSWORD=sua_senha_de_app
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Email de destino para notificações de admin
app.admin.notification.email=${ADMIN_NOTIFICATION_EMAIL:reinaldoinfra07@gmail.com}

# CORS — restringir em produção
# Em produção, substituir por: https://api.defesaemfoco.com.br
spring.web.cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGINS:*}
