server.port=8080

# PostgreSQL Configuration
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/defesacivil_db}
spring.datasource.username=${DATABASE_USERNAME:defesacivil}
spring.datasource.password=${DATABASE_PASSWORD:defesa@2025}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# MinIO Configuration
minio.endpoint=${MINIO_ENDPOINT:https://seeker-with-interviews-findarticles.trycloudflare.com}
minio.access-key=${MINIO_ACCESS_KEY:admin}
minio.secret-key=${MINIO_SECRET_KEY:defesa@2025}
minio.bucket-name=${MINIO_BUCKET:defesa-civil}

# Admin password — OBRIGATÓRIO configurar via variável de ambiente em produção
# export APP_ADMIN_PASSWORD=SuaSenhaSeguraAqui
app.admin.password=${APP_ADMIN_PASSWORD:}

# Mail Configuration — usar variáveis de ambiente em produção
# export MAIL_USERNAME=seu_email@gmail.com
# export MAIL_PASSWORD=sua_senha_de_app
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Email de destino para notificações de admin
app.admin.notification.email=${ADMIN_NOTIFICATION_EMAIL:reinaldoinfra07@gmail.com}

# CORS — restringir em produção
# Em produção, substituir por: https://api.defesaemfoco.com.br
spring.web.cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGINS:*}
# JWT Secret - OBRIGATÓRIO 32+ caracteres em produção
# export APP_JWT_SECRET=SuaChaveSuperSecretaComMaisDe32Caracteres
app.jwt.secret=${APP_JWT_SECRET:defesa_civil_app_secret_key_fixed_for_dev_32char}

# Actuator — Expor APENAS o health check (segurança)
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
